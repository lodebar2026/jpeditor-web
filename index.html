        <div id="recognition-progress" hidden aria-live="polite">
          <div class="recognition-progress-card">
            <span class="progress-spinner" aria-hidden="true"></span>
            <div>
              <strong>正在识别并生成排版</strong>
              <span>完成后将直接显示可编辑的乐谱</span>
            </div>
          </div>
        </div>
      </div>
      <div id="status" class="sr-only" role="status" aria-live="polite"></div>
    </div>
    <!-- hidden off-screen svg used for getBBox/getComputedTextLength measurement -->
    <svg id="measure-svg" width="0" height="0" aria-hidden="true"></svg>
  </body>
</html>
